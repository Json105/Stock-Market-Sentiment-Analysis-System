# 全服務整合 docker-compose
# 包含：MySQL + phpMyAdmin +  Metabase
# 使用方式：
#   docker compose -f docker-compose-all.yml up

# Port 分配：
#   3306  - MySQL
#   8080  - phpMyAdmin
#   8081  - Airflow Web UI
#   3000  - Metabase

services: # 定義所有要啟動的服務 
 # ===== Message Broker =====
 
 
 # ===== Database =====
  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mydb
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-1234}
    volumes:
      - mysql:/var/lib/mysql
      # share volumes of docker container to outside volume, 
      # let data persist
      # 將 docker container 的 volumes 跟外部 volumes 做連結, 
      # 讓資料不會因為 container close or update 而遺失
    # 設定 mysql 使用原生認證的密碼 hash
    command: --default-authentication-plugin=mysql_native_password

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
    depends_on:
      - mysql

# 在最外層加上 volumes 宣告，確保資料持久化
volumes:
  mysql:

  

